name: Full DevOps Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "vote/**"
      - "result/**"
      - "worker/**"
      - "terraform/**"

jobs:

  # -------------------------
  # TEST STAGE
  # -------------------------
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Python (vote)
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - run: |
          cd vote
          pip install -r requirements.txt
          python -m compileall .

      # Node (result)
      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - run: |
          cd result
          npm install
          npm test || echo "No tests found"

      # .NET (worker)
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0"

      - run: |
          cd worker
          dotnet restore
          dotnet build --no-restore


  # -------------------------
  # BUILD & PUSH DOCKER IMAGES
  # -------------------------
  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Images
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/voting-app-vote:latest ./vote
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/voting-app-result:latest ./result
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/voting-app-worker:latest ./worker

      - name: Push Images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/voting-app-vote:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/voting-app-result:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/voting-app-worker:latest


  # -------------------------
  # TERRAFORM (ONLY IF CHANGED)
  # -------------------------
  terraform:
    runs-on: ubuntu-latest
    needs: build-and-push

    # ✅ Runs ONLY when terraform folder changes
    if: contains(github.event.head_commit.modified, 'terraform')

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      - name: Terraform Plan
        run: |
          cd terraform
          terraform plan

      - name: Terraform Apply
        run: |
          cd terraform
          terraform apply -auto-approve