version: "3.9"

services:

  vote:
    build: ./vote
    ports:
      - "5002:80"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis

  result:
    build: ./result
    ports:
      - "5003:4000"
    depends_on:
      - db
    environment:
      - DB_HOST=db

  worker:
    build: ./worker
    depends_on:
      - redis
      - db
    environment:
      - REDIS_HOST=redis
      - DB_HOST=db

  redis:
    image: redis:alpine
    restart: always

  db:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./db:/docker-entrypoint-initdb.d/